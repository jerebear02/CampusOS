{% extends "layout.html" %}
{% block title %}Add Transaction — CampusOS{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Add Transaction</h2>
    <p class="auth-sub">Log income or an expense</p>

    <form method="POST" action="{{ url_for('add_transaction') }}">

      <div class="form-group">
        <label>Type</label>
        <div class="type-toggle">
          <label class="type-option">
            <input type="radio" name="type" value="expense" checked />
            <span>💸 Expense</span>
          </label>
          <label class="type-option">
            <input type="radio" name="type" value="income" />
            <span>💰 Income</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" placeholder="e.g. Groceries, Paycheck, Rent…" required />
      </div>

      <div class="form-group">
        <label>Amount ($)</label>
        <input type="number" name="amount" placeholder="0.00" step="0.01" min="0.01" required />
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ today }}" required />
      </div>

      <div class="form-group">
        <label>Category <span class="optional">(optional)</span></label>
        <select name="category_id">
          <option value="">— No category —</option>
          {% for c in categories %}
            <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
        <a href="{{ url_for('manage_categories') }}" style="font-size:.8rem; margin-top:.3rem; display:inline-block">+ Manage categories</a>
      </div>

      <div class="form-group">
        <label>Note <span class="optional">(optional)</span></label>
        <input type="text" name="note" placeholder="Optional note…" />
      </div>

      <button type="submit" class="btn-primary btn-block">Add transaction</button>
      <a href="{{ url_for('budget') }}" class="btn-ghost btn-block" style="margin-top:.5rem">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
