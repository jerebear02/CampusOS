{% extends "layout.html" %}
{% block title %}Join CampusOS{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Create your account</h2>
    <p class="auth-sub">Join the skill exchange community</p>

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="coolstudent42" required autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@school.edu" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required />
      </div>
      <div class="form-group">
        <label>School <span class="optional">(optional)</span></label>
        <input type="text" name="school" placeholder="Snow College, Georgia Tech…" />
      </div>
      <div class="form-group">
        <label>Bio <span class="optional">(optional)</span></label>
        <textarea name="bio" rows="2" placeholder="CS major, love tutoring math…"></textarea>
      </div>
      <button type="submit" class="btn-primary btn-block">Create account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
