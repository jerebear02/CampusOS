{% extends "layout.html" %}
{% block title %}Log in — CampusOS{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="auth-sub">Log in to your CampusOS account</p>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="coolstudent42" required autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary btn-block">Log in</button>
    </form>

    <p class="auth-switch">No account? <a href="{{ url_for('register') }}">Join free</a></p>
  </div>
</div>
{% endblock %}
